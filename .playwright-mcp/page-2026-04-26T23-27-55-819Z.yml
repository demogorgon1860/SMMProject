          - heading "Who we are" [level=2] [ref=e62]
          - paragraph [ref=e63]: SMMWorld ("we", "our", "us") is operated by SMMWorld Ltd. We provide an Instagram growth network — likes, follows, and comments delivered with real quality through our own infrastructure.
          - heading "What the service is" [level=2] [ref=e64]
          - paragraph [ref=e65]:
            - text: We are
            - strong [ref=e66]: not a reseller
            - text: . Every action you order is dispatched through our own delivery network and executed by us directly. We do not buy from external panels.
          - heading "Eligibility" [level=2] [ref=e67]
          - paragraph [ref=e68]: You must be at least 18 years old (or the age of majority in your jurisdiction) and not located in a sanctioned country.
          - heading "Your account" [level=2] [ref=e69]
          - paragraph [ref=e70]: You're responsible for keeping your password and API key safe. Notify us immediately if you suspect unauthorized access.
          - heading "API keys" [level=3] [ref=e71]
          - paragraph [ref=e72]: API keys grant full account access. Treat them like passwords. Rotate them in Profile → Security at any time.
          - heading "Orders & delivery" [level=2] [ref=e73]
          - paragraph [ref=e74]: Order processing begins automatically once payment is confirmed. Median start time is 47 seconds. Larger orders dripfeed based on the service profile.
          - paragraph [ref=e75]: We do not guarantee Instagram won't change its policies or remove content. We do guarantee that we will replace dropped actions during the 30-day refill window.
          - heading "Acceptable use" [level=2] [ref=e76]
          - paragraph [ref=e77]: "You may not use the service to:"
          - list [ref=e78]:
            - listitem [ref=e79]: Target accounts you do not own or have permission to grow
