<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes" />
    <meta name="cryptomus" content="051f32c0" />

    <!-- Mobile App Capabilities -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />

    <!-- Theme color: stays in sync with current theme -->
    <meta name="theme-color" content="#fafaf9" />
    <meta name="theme-color" content="#0a0a0a" media="(prefers-color-scheme: dark)" />

    <meta name="application-name" content="SMMWorld" />
    <meta name="description" content="Infrastructure for Instagram growth — real delivery, non-drop, crypto-only, Perfect Panel-compatible API." />

    <!-- Brand mark + favicon -->
    <link rel="icon" type="image/png" href="/logo-v2.png" />
    <link rel="apple-touch-icon" href="/logo-v2.png" />

    <title>SMMWorld &mdash; Infrastructure for Instagram growth</title>

    <!-- Fonts: Inter + JetBrains Mono -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Prevent FOUC: apply theme + accent + density before first paint -->
    <script>
      (function () {
        try {
          var root = document.documentElement;
          var theme = localStorage.getItem('smm:theme');
          var accent = localStorage.getItem('smm:accent');
          var density = localStorage.getItem('smm:density');
          var hero = localStorage.getItem('smm:hero');

          if (
            theme === 'dark' ||
            (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)
          ) {
            root.classList.add('dark');
          }
          if (accent && accent !== 'indigo') root.setAttribute('data-accent', accent);
          if (density && density !== 'comfortable') root.setAttribute('data-density', density);
          if (hero === 'B') root.setAttribute('data-hero', 'B');
        } catch (e) {
          /* noop */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
