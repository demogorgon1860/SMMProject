            - paragraph [ref=e58]: This is the legally binding version. A plain-English summary lives at the top of each document.
        - article [ref=e59]:
          - heading "Plain-English summary" [level=2] [ref=e60]
          - paragraph [ref=e61]: We collect the minimum needed to run the service. We don't sell your data. We don't run ads. Crypto-only payments mean we don't even store card details.
          - heading "What we collect" [level=2] [ref=e62]
          - list [ref=e63]:
            - listitem [ref=e64]: "Account: email, username, hashed password"
            - listitem [ref=e65]: "Usage: orders you place, links you submit, IP address, user-agent"
            - listitem [ref=e66]: "Billing: deposit transactions and crypto wallet addresses"
            - listitem [ref=e67]: "Support: ticket content and attachments you send"
          - heading "How we use it" [level=2] [ref=e68]
          - paragraph [ref=e69]: To deliver orders, prevent fraud, comply with law, and improve the service. We do not use your data to train AI or sell to third parties.
          - heading "Who we share with" [level=2] [ref=e70]
          - paragraph [ref=e71]: We share data only with sub-processors necessary to operate (e.g. Cryptomus for payments) under appropriate data-processing agreements.
          - heading "How long we keep it" [level=2] [ref=e72]
          - paragraph [ref=e73]: Active account data is retained while your account is open. Order history and audit logs are kept 7 years for accounting and AML compliance. After deletion (Profile → Danger Zone), personal data is purged within 30 days.
          - heading "Your rights" [level=2] [ref=e74]
          - paragraph [ref=e75]:
            - text: Under GDPR / CCPA you can request access, correction, deletion, or export of your data. Email
            - code [ref=e76]: compliance@smmworld.vip
            - text: from the address on your account.
          - heading "Cookies" [level=2] [ref=e77]
          - paragraph [ref=e78]: We use a single session cookie for authentication and a refresh-token cookie. We do not use tracking or advertising cookies.
          - heading "Children" [level=2] [ref=e79]
          - paragraph [ref=e80]: Service is not directed to children under 18. We delete any account we discover does not meet this requirement.
          - heading "Contact DPO" [level=2] [ref=e81]
          - paragraph [ref=e82]:
            - text: Email
            - code [ref=e83]: dpo@smmworld.vip
            - text: . We respond within 30 days.
