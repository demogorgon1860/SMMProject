            - paragraph [ref=e52]: This is the legally binding version. A plain-English summary lives at the top of each document.
        - article [ref=e53]:
          - heading "Why this exists" [level=2] [ref=e54]
          - paragraph [ref=e55]: We're a crypto-accepting business operating in the EU. We screen for compliance with EU AMLD6 and equivalent regulations.
          - heading "Wallet screening" [level=2] [ref=e56]
          - paragraph [ref=e57]: Every incoming deposit is screened against sanction lists and known mixer/darknet flows via our payment processor. Flagged deposits are held until cleared.
          - heading "When we ask for ID" [level=2] [ref=e58]
          - paragraph [ref=e59]: "We may request KYC documents in narrow cases:"
          - list [ref=e60]:
            - listitem [ref=e61]: Cumulative deposits exceed €15,000 in a rolling 12-month period
            - listitem [ref=e62]: The wallet screening flags require enhanced due diligence
            - listitem [ref=e63]: You request a withdrawal larger than €10,000 in a single transaction
          - paragraph [ref=e64]: Most accounts will never see this. When we do request it, the request is encrypted in transit and storage, and documents are deleted after the verification window.
          - heading "Suspicious activity reports" [level=2] [ref=e65]
          - paragraph [ref=e66]: We file SARs with the appropriate Financial Intelligence Unit when legally required. We do not warn affected users in such cases.
          - heading "Sanctions" [level=2] [ref=e67]
          - paragraph [ref=e68]: We do not knowingly serve users in OFAC-sanctioned jurisdictions, North Korea, Iran, Syria, Cuba, the Crimea region, Donetsk, or Luhansk.
