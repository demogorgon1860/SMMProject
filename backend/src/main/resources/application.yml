---
# ===============================
# SMM PANEL APPLICATION CONFIGURATION
# ===============================
# Main configuration file for the Social Media Marketing Panel
# 
# SECURITY NOTICE: All sensitive values are externalized to environment variables
# Ensure the following environment variables are set in production:
# - DB_PASSWORD, REDIS_PASSWORD, JWT_SECRET
# - CRYPTOMUS_API_KEY, CRYPTOMUS_API_SECRET
# - CRYPTOMUS_WEBHOOK_SECRET, CRYPTOMUS_MERCHANT_ID
#
# For environment-specific overrides, use:
# - application-dev.yml (development)
# - application-stage.yml (staging) 
# - application-prod.yml (production)
# ===============================

# ===============================
# SERVER CONFIGURATION
# ===============================
server:
  port: 8080
  # context-path removed - paths are now explicit in controllers
  # Graceful shutdown: in-flight HTTP requests get to finish before the listener stops
  # accepting new connections. Pairs with `spring.lifecycle.timeout-per-shutdown-phase`
  # below and the docker-compose `stop_grace_period` so a `docker compose up -d --build`
  # rolling deploy doesn't 502 anyone mid-request.
  shutdown: graceful
  compression:
    enabled: true
    mime-types: >
      text/html,text/xml,text/plain,text/css,text/javascript,
      application/javascript,application/json
    min-response-size: 1024
  http2:
    enabled: true
  tomcat:
    connection-timeout: 20000
    keep-alive-timeout: 20000
    max-connections: 8192
    threads:
      max: 200
      min-spare: 10
  error:
    include-message: always
    include-binding-errors: always

# ===============================
# SPRING CONFIGURATION
# ===============================
spring:
  # Include Resilience4j configuration
  config:
    import: 
      - optional:classpath:application-resilience4j.yml
  # Application startup configuration
  main:
    lazy-initialization: false  # Ensure all beans are initialized at startup
    allow-bean-definition-overriding: false  # Prevent accidental bean overrides
    web-application-type: servlet
  lifecycle:
    timeout-per-shutdown-phase: 30s  # Grace period for shutdown
  # ===============================
  # RABBITMQ CONFIGURATION
  # ===============================
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:guest}
    password: ${SPRING_RABBITMQ_PASSWORD:guest}
    virtual-host: ${SPRING_RABBITMQ_VIRTUAL_HOST:/}
  # ===============================
  # DATABASE CONFIGURATION
  # ===============================
  datasource:
    url: >
      jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:smm_panel}
    username: ${DB_USER:smm_admin}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      # Connection pool sizing - Optimized for Windows/WSL2 environment
      # PostgreSQL max_connections should be set to 200 for this configuration
      maximum-pool-size: ${DB_MAX_POOL_SIZE:100}      # OPTIMIZED: Realistic for Windows/WSL2
      minimum-idle: ${DB_MIN_IDLE:30}                 # Keep 1/3 connections ready
      connection-timeout: ${DB_CONNECTION_TIMEOUT:30000}    # 30 seconds (increased)
      validation-timeout: ${DB_VALIDATION_TIMEOUT:5000}     # 5 seconds (added)
      idle-timeout: ${DB_IDLE_TIMEOUT:600000}        # 10 minutes
      max-lifetime: ${DB_MAX_LIFETIME:1800000}       # 30 minutes (must be < DB wait_timeout)
      connection-test-query: SELECT 1               # Health check query
      leak-detection-threshold: ${DB_LEAK_DETECTION_THRESHOLD:15000}  # 15 seconds
      pool-name: SMM-HikariPool                     # Named pool for monitoring
      register-mbeans: true                         # Enable JMX monitoring
      connection-init-sql: "SET statement_timeout = 30000"  # 30 second query timeout
  # ===============================
  # DATABASE MIGRATION - LIQUIBASE (SINGLE SOURCE OF TRUTH)
  # ===============================
  # IMPORTANT: Liquibase is the only migration tool. 
  # Flyway has been completely removed from this project.
  # All schema changes must go through Liquibase changeSets.
  
  # ===============================
  # LIQUIBASE CONFIGURATION
  # ===============================
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
    database-change-log-table: databasechangelog
    database-change-log-lock-table: databasechangeloglock
    enabled: ${SPRING_LIQUIBASE_ENABLED:true}
    contexts: ${SPRING_LIQUIBASE_CONTEXTS:dev}
    default-schema: public
    drop-first: false  # NEVER drop database on startup
    test-rollback-on-update: false
    
  # ===============================
  # SQL INIT - DISABLED (Using Liquibase)
  # ===============================
  sql:
    init:
      mode: never  # Disable Spring Boot SQL initialization
      
  jpa:
    hibernate:
      ddl-auto: none  ## Disable schema validation completely
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    show-sql: ${SHOW_SQL:false}  # Set to true only for debugging
    properties:
      hibernate:
        # Explicitly set PostgreSQL dialect for Hibernate 6
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: ${HIBERNATE_FORMAT_SQL:false}
        use_sql_comments: ${HIBERNATE_SQL_COMMENTS:false}
        types:
          print:
            banner: false
        # PostgreSQL enum type handling
        default_schema: public
        
        # ===============================
        # HIBERNATE STATISTICS CONFIGURATION
        # ===============================
        generate_statistics: ${HIBERNATE_STATISTICS:false}  # Disabled to reduce logs
        
        # ===============================
        # JDBC BATCH CONFIGURATION
        # ===============================
        jdbc:
          batch_size: ${HIBERNATE_BATCH_SIZE:25}
          batch_versioned_data: true
          fetch_size: ${HIBERNATE_FETCH_SIZE:50}
          time_zone: UTC
          use_get_generated_keys: true  # PostgreSQL enum type handling
          lob:
            non_contextual_creation: true
        
        # ===============================
        # QUERY OPTIMIZATION
        # ===============================
        order_inserts: true
        order_updates: true
        default_batch_fetch_size: ${HIBERNATE_DEFAULT_BATCH_FETCH_SIZE:50}
        max_fetch_depth: 3
        enable_lazy_load_no_trans: false
        
        # ===============================
        # QUERY PLAN CACHE CONFIGURATION
        # ===============================
        query:
          plan_cache_max_size: ${HIBERNATE_QUERY_PLAN_CACHE_SIZE:2048}
          plan_parameter_metadata_max_size: ${HIBERNATE_QUERY_PLAN_PARAMETER_CACHE_SIZE:128}
          
        # ===============================
        # SECOND LEVEL CACHE CONFIGURATION
        # ===============================
        cache:
          use_second_level_cache: ${HIBERNATE_L2_CACHE_ENABLED:true}
          use_query_cache: ${HIBERNATE_QUERY_CACHE_ENABLED:true}
          region:
            factory_class: org.hibernate.cache.jcache.JCacheRegionFactory
        javax:
          cache:
            provider: org.ehcache.jsr107.EhcacheCachingProvider
            uri: classpath:ehcache-config.xml
          
        # ===============================
        # CONNECTION AND TRANSACTION
        # ===============================
        connection:
          provider_disables_autocommit: true
          autocommit: false
          isolation: 2  # READ_COMMITTED
          
        # ===============================
        # PERFORMANCE MONITORING
        # ===============================
        session_factory:
          statement_inspector: com.smmpanel.config.HibernateStatementInspector
        
        # ===============================
        # ADDITIONAL OPTIMIZATIONS
        # ===============================
        temp:
          use_jdbc_metadata_defaults: false
        event:
          merge:
            entity_copy_observer: allow
        
    open-in-view: false

  # ===============================
  # REDIS CONFIGURATION
  # ===============================
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 2000ms
      # Using Lettuce client with optimized configuration
      lettuce:
        # Share native connection (best for single Redis instance per Stack Overflow)
        share-native-connection: true
        pool:
          enabled: true
          max-active: 20        # Sized for 15 parallel threads + headroom
          max-idle: 16          # Keep 80% of connections ready
          min-idle: 0           # Set to 0 per best practice
          max-wait: 2000ms
          time-between-eviction-runs: 60s
        cluster:
          refresh:
            adaptive: true
            period: 30s
        shutdown-timeout: 100ms
        # Client options for better reliability
        client-options:
          auto-reconnect: true
          ping-before-activate-connection: true
        # Socket options for performance
        socket-options:
          keep-alive: true
          tcp-no-delay: true    # Reduce latency
  cache:
    type: redis
    redis:
      time-to-live: 300000
      key-prefix: "smm:cache:"
      use-key-prefix: true
      cache-null-values: false

  # ===============================
  # OAUTH2 CLIENT CONFIGURATION
  # ===============================
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
            scope:
              - email
              - profile
              - openid
            redirect-uri: "{baseUrl}/login/oauth2/code/google"
            authorization-grant-type: authorization_code
            client-name: Google
          github:
            client-id: ${GITHUB_CLIENT_ID:}
            client-secret: ${GITHUB_CLIENT_SECRET:}
            scope:
              - user:email
              - read:user
            redirect-uri: "{baseUrl}/login/oauth2/code/github"
            authorization-grant-type: authorization_code
            client-name: GitHub
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
            user-name-attribute: sub
            jwk-set-uri: https://www.googleapis.com/oauth2/v3/certs
          github:
            authorization-uri: https://github.com/login/oauth/authorize
            token-uri: https://github.com/login/oauth/access_token
            user-info-uri: https://api.github.com/user
            user-name-attribute: id

  # ===============================
  # KAFKA CONFIGURATION
  # ===============================
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
    producer:
      key-serializer: >
        org.apache.kafka.common.serialization.StringSerializer
      value-serializer: >
        org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      batch-size: 32768  # Increased for better throughput
      linger-ms: 10     # Batch messages for 10ms for better throughput
      buffer-memory: 33554432
      transaction-id-prefix: smm-panel-tx-
      properties:
        enable.idempotence: "true"
        compression.type: gzip
        delivery.timeout.ms: 120000
        request.timeout.ms: 30000
        max.in.flight.requests.per.connection: 5
        client.id: smm-panel-producer
        metrics.recording.level: INFO
        spring.json.type.mapping: >
          order:com.smmpanel.entity.Order,
          notification:java.util.Map,
          orderStateUpdate:java.util.Map
    consumer:
      key-deserializer: >
        org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: >
        org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      group-id: smm-panel-group
      auto-offset-reset: earliest
      enable-auto-commit: false
      isolation-level: read-committed
      max-poll-records: 50
      fetch-min-bytes: 1
      fetch-max-wait-ms: 500
      session-timeout-ms: 30000
      heartbeat-interval-ms: 3000
      max-poll-interval-ms: 900000  # 15 minutes - allows 3 orders @ 5min each concurrently
      properties:
        spring.deserializer.value.delegate.class: >
          org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: >
          com.smmpanel.entity,com.smmpanel.dto,com.smmpanel.event,java.util
        partition.assignment.strategy: org.apache.kafka.clients.consumer.RangeAssignor
        client.id: smm-panel-consumer
        metrics.recording.level: INFO
        spring.json.type.mapping: >
          order:com.smmpanel.entity.Order,
          notification:java.util.Map,
          orderStateUpdate:java.util.Map
        spring.json.use.type.headers: false
        spring.json.value.default.type: java.util.Map
    listener:
      concurrency: 8  # Optimized for high throughput with proper thread pool sizing
      type: batch
      poll-timeout: 3000
      ack-mode: batch  # Batch acknowledgment for better performance
      missing-topics-fatal: false  # Continue even if topics don't exist yet
      idle-event-interval: 30000  # Send idle events every 30 seconds
    retry-topic:
      attempts: 3
      delay: 1000
      multiplier: 2.0
      max-delay: 10000
        
  # ===============================
  # KAFKA MONITORING CONFIGURATION  
  # ===============================
  kafka-monitoring:
    lag:
      threshold: ${KAFKA_LAG_THRESHOLD:10000}
    error:
      threshold: ${KAFKA_ERROR_THRESHOLD:0.05}
    dead-letter-queue:
      topic: ${KAFKA_DLQ_TOPIC:smm.video.processing.dlq}

  # ===============================
  # FILE UPLOAD CONFIGURATION
  # ===============================
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 50MB
      file-size-threshold: 1MB

  # ===============================
  # ASYNC PROCESSING CONFIGURATION
  # ===============================
  task:
    execution:
      pool:
        core-size: 50  # Increased for high concurrency operations
        max-size: 100  # Doubled to handle increased load
        queue-capacity: 2000  # Increased queue capacity
      thread-name-prefix: sms-async-
    scheduling:
      pool:
        size: 20  # Increased for more scheduled tasks
      thread-name-prefix: sms-scheduled-

# ===============================
# APPLICATION CONFIGURATION
# ===============================
app:
  # ===============================
  # DATABASE POOL CONFIGURATION (MOVED TO DATASOURCE.HIKARI SECTION)
  # ===============================

  # ===============================
  # SECURITY CONFIGURATION
  # ===============================
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}
    refresh-cookie-name: ${JWT_REFRESH_COOKIE_NAME:refresh_token}
    refresh-expiration-days: ${JWT_REFRESH_EXPIRATION_DAYS:7}
    cookie-domain: ${JWT_COOKIE_DOMAIN:}
    cookie-secure: ${JWT_COOKIE_SECURE:true}
  security:
    api-key:
      enabled: true
      header: X-API-Key
      hash-algorithm: SHA-256
      global-salt: ${API_KEY_GLOBAL_SALT:smm-panel-secure-salt-2024}
  cors:
    allowed-origins: "${CORS_ORIGINS:http://localhost:3000,https://demo.perfectpanel.com,https://smmworld.vip,https://www.smmworld.vip}"
    allowed-methods: "GET,POST,PUT,DELETE,OPTIONS"
    allowed-headers: "Authorization,Content-Type,X-API-Key,Accept,Origin,Idempotency-Key"
    allow-credentials: true
    max-age: 3600
  websocket:
    allowed-origins: "http://localhost:3000,https://smmworld.vip,https://www.smmworld.vip"
  # ===============================
  # OAUTH2 CONFIGURATION
  # ===============================
  oauth2:
    enabled: ${OAUTH2_ENABLED:true}
    providers:
      google:
        client-id: ${GOOGLE_CLIENT_ID:}
        client-secret: ${GOOGLE_CLIENT_SECRET:}
        redirect-uri: "{baseUrl}/login/oauth2/code/google"
        scope:
          - email
          - profile
      github:
        client-id: ${GITHUB_CLIENT_ID:}
        client-secret: ${GITHUB_CLIENT_SECRET:}
        redirect-uri: "{baseUrl}/login/oauth2/code/github"
        scope:
          - user:email
          - read:user
    success-redirect-url: ${OAUTH2_SUCCESS_URL:http://localhost:3000/dashboard}
    failure-redirect-url: ${OAUTH2_FAILURE_URL:http://localhost:3000/login?error=oauth2}

  # ===============================
  # RATE LIMITING CONFIGURATION
  # ===============================
  rate-limit:
    enabled: true
    orders:
      per-minute: 100
      per-hour: 1000
    api:
      per-minute: 300
      per-hour: 10000
    auth:
      per-minute: 60
    register:
      # Per-IP. Registration is the highest-value abuse vector (auto-creates accounts that can
      # claim welcome credit and use the panel's outbound email). Tighter than login on purpose.
      per-hour: ${REGISTER_RATE_LIMIT_PER_HOUR:3}

  # ===============================
  # EXTERNAL API CONFIGURATIONS
  # ===============================
  cryptomus:
    enabled: ${CRYPTOMUS_ENABLED:true}
    api:
      url: ${CRYPTOMUS_API_URL}
      ## Payment API Key for all operations
      payment-key: ${CRYPTOMUS_PAYMENT_API_KEY}
      ## Merchant-specific fields (optional for simple user accounts)
      secret: ${CRYPTOMUS_API_SECRET:not-applicable}
    webhook:
      secret: ${CRYPTOMUS_WEBHOOK_SECRET:not-applicable}
    merchant-id: ${CRYPTOMUS_MERCHANT_ID}
    min-deposit: ${CRYPTOMUS_MIN_DEPOSIT:5.00}
    timeout: 30000

  # ===============================
  # CACHING CONFIGURATION
  # ===============================
  cache:
    # Cache TTL values in seconds - standardized across environments
    services:
      ttl: ${CACHE_SERVICES_TTL:3600}      # 1 hour - service data changes infrequently
    users:
      ttl: ${CACHE_USERS_TTL:1800}         # 30 minutes - user data moderately dynamic
    conversion-coefficients:
      ttl: ${CACHE_COEFFICIENTS_TTL:7200}  # 2 hours - coefficients change rarely

  # ===============================
  # FILE UPLOAD & PROCESSING
  # ===============================
  file:
    upload:
      path: ${FILE_UPLOAD_PATH:/tmp/smm-panel/uploads}
    processing:
      timeout: 300
      max-concurrent: 3

  # ===============================
  # ERROR HANDLING CONFIGURATION
  # ===============================
  error:
    include-stack-trace: ${ERROR_INCLUDE_STACK_TRACE:false}
    include-debug-info: ${ERROR_INCLUDE_DEBUG_INFO:false}

  # ===============================
  # BUSINESS LOGIC CONFIGURATION
  # ===============================
  order:
    processing:
      batch-size: 100
      max-retries: 3
      retry-delay: 5000
      timeout: 300000
    quota-check:
      enabled: true
      # Rolling window for the per-URL (action+gender) cumulative cap. 90 days: a profile's
      # delivered followers/likes are effectively permanent, so a short window let old consumed
      # age out and the cap "reset", admitting repeat orders the bot could no longer deliver.
      window-days: 90
    # Per-URL order serialization: orders on the SAME normalized link are dispatched one-at-a-time
    # (start-count correctness). enabled=false ⇒ legacy immediate dispatch. The sweeper is the
    # authoritative backstop; stuck active orders are alerted (System Health) but NOT auto-released.
    serialization:
      enabled: ${ORDER_URL_SERIALIZATION_ENABLED:true}
      active-statuses: ${ORDER_SERIALIZATION_ACTIVE_STATUSES:IN_PROGRESS,PROCESSING,ACTIVE,PAUSED,HOLDING}
      sweep-interval-ms: ${ORDER_SERIALIZATION_SWEEP_MS:60000}
      sweep-batch-size: ${ORDER_SERIALIZATION_SWEEP_BATCH:500}
      stuck-active-hours: ${ORDER_SERIALIZATION_STUCK_HOURS:6}
      stuck-alert-cooldown-minutes: ${ORDER_SERIALIZATION_STUCK_ALERT_COOLDOWN_MIN:60}
  balance:
    minimum-deposit: 1.00
    maximum-deposit: 10000.00
    transaction-timeout: 300000
    retry:
      max-attempts: 5
      initial-delay: 100
      max-delay: 5000
      multiplier: 2.0
  
  # ===============================
  # TRANSACTION MANAGEMENT
  # ===============================
  transaction:
    monitoring:
      enabled: ${TRANSACTION_MONITORING_ENABLED:false}
    trace:
      enabled: ${TRANSACTION_TRACE_ENABLED:false}
    isolation:
      balance-operations: SERIALIZABLE
      order-operations: REPEATABLE_READ
      read-operations: READ_COMMITTED
    timeout:
      balance-operations: 10
      order-operations: 30
      read-operations: 15
      default: 30
  perfectpanel:
    compatible: "true"
    api-version: "2.0"
    status-mapping:
      enabled: "true"

  # ===============================
  # DEVELOPMENT/DEBUG SETTINGS
  # ===============================
  features:
    payment-processing:
      enabled: ${PAYMENT_PROCESSING_ENABLED:true}
    email-notifications:
      enabled: ${EMAIL_NOTIFICATIONS_ENABLED:true}
  monitoring:
    enabled: true
    slow-query-threshold: 1000
    memory-threshold: 80
    cpu-threshold: 80
    query-count:
      enabled: ${QUERY_COUNT_MONITORING_ENABLED:false}
      warn-threshold: 5
      error-threshold: 10
    connection-pool:
      high-usage-threshold: ${CONNECTION_POOL_HIGH_USAGE_THRESHOLD:75}
      critical-usage-threshold: ${CONNECTION_POOL_CRITICAL_USAGE_THRESHOLD:90}
      slow-query-threshold: ${CONNECTION_POOL_SLOW_QUERY_THRESHOLD:5000}
      
  # ===============================
  # SELENIUM CONFIGURATION
  # ===============================
  selenium:
    hub:
      url: ${SELENIUM_HUB_URL:http://localhost:4444/wd/hub}
      timeout: ${SELENIUM_HUB_TIMEOUT:300000}
    browser:
      headless: ${SELENIUM_HEADLESS:false}
    retry:
      attempts: ${SELENIUM_RETRY_ATTEMPTS:3}
    profiles:
      path: ${SELENIUM_PROFILES_PATH:./selenium-profiles}
    test-mode: ${TEST_MODE:false}

  # ===============================
  # TELEGRAM BOT CONFIGURATION
  # ===============================
  telegram:
    enabled: ${TELEGRAM_NOTIFICATIONS_ENABLED:true}
    bot:
      # NEVER inline a default — committed defaults leak the bot token to git.
      # Set TELEGRAM_BOT_TOKEN / TELEGRAM_CHAT_ID in .env.docker on prod (and your
      # local .env for dev). If the var is unset the integration just no-ops.
      token: ${TELEGRAM_BOT_TOKEN:}
      chat-id: ${TELEGRAM_CHAT_ID:}
      webhook-secret: ${TELEGRAM_WEBHOOK_SECRET:}
    proxy:
      enabled: ${TELEGRAM_PROXY_ENABLED:false}
      host: ${TELEGRAM_PROXY_HOST:}
      port: ${TELEGRAM_PROXY_PORT:0}
      username: ${TELEGRAM_PROXY_USERNAME:}
      password: ${TELEGRAM_PROXY_PASSWORD:}
    cancel:
      timeout-hours: ${TELEGRAM_CANCEL_TIMEOUT_HOURS:4}
      default-action: ${TELEGRAM_CANCEL_DEFAULT_ACTION:proceed}
    profit:
      redis-ttl-days: ${TELEGRAM_PROFIT_REDIS_TTL_DAYS:8}
    # "System Health" group — separate chat for infra alerts (bot-down + worst-error
    # profiles). Same bot token; the bot must be added to this group. Blank chat-id =>
    # health alerts disabled (no fallback to the main order chat). Set
    # TELEGRAM_SYSTEM_HEALTH_CHAT_ID in .env.docker on prod.
    health:
      enabled: ${TELEGRAM_SYSTEM_HEALTH_ENABLED:true}
      chat-id: ${TELEGRAM_SYSTEM_HEALTH_CHAT_ID:}
      check-interval-ms: ${TELEGRAM_HEALTH_CHECK_INTERVAL_MS:60000}
      down-threshold: ${TELEGRAM_HEALTH_DOWN_THRESHOLD:2}
      # Cosmetic only: show this host instead of the docker alias host.docker.internal in alert
      # text (connection still uses INSTAGRAM_BOT_URLS). E.g. the panel server's public IP.
      display-host: ${TELEGRAM_HEALTH_DISPLAY_HOST:}
      profiles:
        report-cron: ${TELEGRAM_HEALTH_PROFILES_CRON:0 0 9 * * *}
        window-hours: ${TELEGRAM_HEALTH_PROFILES_WINDOW_HOURS:24}
        min-errors: ${TELEGRAM_HEALTH_PROFILES_MIN_ERRORS:5}
        top-n: ${TELEGRAM_HEALTH_PROFILES_TOP_N:10}

  # ===============================
  # INSTAGRAM BOT CONFIGURATION
  # ===============================
  instagram:
    bot:
      url: ${INSTAGRAM_BOT_URL:http://45.142.211.90:8080}
      urls: ${INSTAGRAM_BOT_URLS:}
      api-key: ${INSTAGRAM_BOT_API_KEY:}
      callback-url: ${INSTAGRAM_CALLBACK_BASE_URL:https://smmworld.vip}
      timeout: ${INSTAGRAM_BOT_TIMEOUT:30000}
      retry-attempts: ${INSTAGRAM_BOT_RETRY_ATTEMPTS:3}
    enabled: ${INSTAGRAM_ENABLED:true}
      
  # ===============================
  # ADDITIONAL SERVICE CONFIGURATION
  # ===============================
  # All prices and amounts are in USDT
  
  # ===============================
  # EMAIL (Resend transactional)
  # ===============================
  email:
    enabled: ${EMAIL_ENABLED:false}
    from: ${EMAIL_FROM:hello@smmworld.vip}
    from-name: ${EMAIL_FROM_NAME:SMMWorld}
    public-base-url: ${PUBLIC_BASE_URL:https://smmworld.vip}
    resend:
      api-key: ${RESEND_API_KEY:}
      base-url: ${RESEND_BASE_URL:https://api.resend.com}
      timeout-ms: ${RESEND_TIMEOUT_MS:8000}

  # ===============================
  # AUTH TOKEN POLICY (Phase 3)
  # ===============================
  auth:
    verification:
      ttl-hours: ${EMAIL_VERIFY_TTL_HOURS:24}
      resend-cooldown-seconds: ${EMAIL_VERIFY_RESEND_COOLDOWN:60}
    password-reset:
      ttl-hours: ${PASSWORD_RESET_TTL_HOURS:1}
    forgot-password:
      # rate-limit per email per hour
      rate-limit-per-hour: ${FORGOT_PASSWORD_RATE_LIMIT:5}

  # ===============================
  # REFILL POLICY
  # ===============================
  refill:
    # Days after order completion during which the user may request a free refill.
    # 0 (or negative) = UNLIMITED — lifetime refill, no time restriction (our policy).
    window-days: ${REFILL_WINDOW_DAYS:0}
    # Live drop-check (bot /api/refill/check) — used by the Refill page.
    check:
      # Scheduler poll cadence for in-flight checks.
      poll-interval-ms: ${REFILL_CHECK_POLL_INTERVAL_MS:10000}
      # Reuse an in-flight RUNNING check newer than this (min) instead of re-queueing the bot.
      # Keep below lost-threshold-minutes so a soon-to-fail check isn't handed back as RUNNING.
      reuse-window-minutes: ${REFILL_CHECK_REUSE_WINDOW_MINUTES:3}
      # Per-user check budget within the window below (throttles the expensive checker).
      user-rate-limit: ${REFILL_CHECK_USER_RATE_LIMIT:20}
      user-rate-window-minutes: ${REFILL_CHECK_USER_RATE_WINDOW_MINUTES:60}
      # If the bot job vanishes (restart / LRU eviction) and the check is older than this → FAILED.
      lost-threshold-minutes: ${REFILL_CHECK_LOST_THRESHOLD_MINUTES:4}
      # Overall ceiling: a check still not done past this is FAILED (bot session TTL ~25 min).
      max-age-minutes: ${REFILL_CHECK_MAX_AGE_MINUTES:30}
    # Automatic refill checking (RefillRequestAutoScheduler) — the customer just submits order
    # numbers; the panel drop-checks each and promotes it to PENDING (drop>0) / NO_DROP / FAILED.
    auto:
      # How often the scheduler advances in-flight CHECKING requests.
      poll-interval-ms: ${REFILL_AUTO_POLL_INTERVAL_MS:12000}
      # Max NEW bot checks kicked off per tick — throttles the load a big paste-list puts on the bot.
      max-starts-per-tick: ${REFILL_AUTO_MAX_STARTS_PER_TICK:5}
      # Max bot checks started for one request before giving up (FAILED).
      max-check-attempts: ${REFILL_AUTO_MAX_CHECK_ATTEMPTS:3}
      # Overall ceiling: a request still CHECKING past this is FAILED (bot likely unreachable).
      max-age-minutes: ${REFILL_AUTO_MAX_AGE_MINUTES:45}

  # ===============================
  # WELCOME CREDIT
  # ===============================
  welcome-credit:
    # USD credited to a user's wallet on first email verification. 0 disables the feature.
    amount: ${WELCOME_CREDIT_AMOUNT:0}

  # ===============================
  # PARTITION MAINTENANCE
  # ===============================
  # Keeps Postgres partitions for `orders` and `operator_logs` ahead of NOW(). Without this,
  # an INSERT past the latest partition's upper bound throws an error. The Liquibase migrations
  # pre-create through 2026-12; the scheduler is what carries us past that cliff.
  partition-maintenance:
    enabled: ${PARTITION_MAINTENANCE_ENABLED:true}
    months-ahead: ${PARTITION_MONTHS_AHEAD:6}
    cron: ${PARTITION_MAINTENANCE_CRON:0 30 1 * * *}

  # ===============================
  # IDEMPOTENCY KEYS (Stripe-style)
  # ===============================
  idempotency:
    # TTL window. A retry of the same Idempotency-Key within this many seconds returns the cached
    # result; outside the window the key is treated as fresh. 5 minutes covers normal browser/network
    # retry envelopes without indefinitely tying up the key.
    ttl-seconds: ${IDEMPOTENCY_TTL_SECONDS:300}
    cleanup-cron: ${IDEMPOTENCY_CLEANUP_CRON:0 15 * * * *}

  error-recovery:
    max-retries: ${ERROR_RECOVERY_MAX_RETRIES:3}
    initial-delay-minutes: ${ERROR_RECOVERY_INITIAL_DELAY_MINUTES:5}
    max-delay-hours: ${ERROR_RECOVERY_MAX_DELAY_HOURS:24}
    backoff-multiplier: ${ERROR_RECOVERY_BACKOFF_MULTIPLIER:2.0}
    
  dead-letter-queue:
    retention-days: ${DLQ_RETENTION_DAYS:30}
    max-entries: ${DLQ_MAX_ENTRIES:10000}

# ===============================
# SENTRY (error reporting)
# ===============================
# Activates only when SENTRY_DSN is non-blank. Leaving the DSN unset is the right
# behavior for dev / CI — the SDK becomes a no-op rather than failing the boot.
# environment: prod | stage | dev (controls Sentry filtering / alert rules)
# release:     stamped at build/deploy time so source-map & stack-trace links work
sentry:
  dsn: ${SENTRY_DSN:}
  environment: ${SENTRY_ENVIRONMENT:${SPRING_PROFILES_ACTIVE:dev}}
  release: ${SENTRY_RELEASE:@project.version@}
  send-default-pii: false                  # never ship request bodies / cookies / IPs verbatim
  traces-sample-rate: ${SENTRY_TRACES_SAMPLE_RATE:0.05}
  attach-stacktrace: true
  enable-tracing: ${SENTRY_TRACING_ENABLED:false}
  exception-resolver-order: -2147483647   # run BEFORE GlobalExceptionHandler so 5xx are captured
  ignored-exceptions-for-type:
    - org.springframework.security.access.AccessDeniedException
    - org.springframework.security.core.AuthenticationException
    - org.springframework.web.bind.MethodArgumentNotValidException
    - jakarta.validation.ConstraintViolationException
    - com.smmpanel.exception.UserValidationException
    - com.smmpanel.exception.OrderValidationException
    - com.smmpanel.exception.InsufficientBalanceException
    - com.smmpanel.exception.RateLimitExceededException
  logging:
    minimum-event-level: error            # only ERROR+ becomes a Sentry event
    minimum-breadcrumb-level: info        # INFO+ becomes a breadcrumb attached to events

# ===============================
# RESILIENCE4J CONFIGURATION
# ===============================
resilience4j:
  circuitbreaker:
    instances:
      payment-api:
        failure-rate-threshold: 40
        slow-call-duration-threshold: PT8S
        wait-duration-in-open-state: PT1M
      # Instagram Bot Circuit Breaker
      instagram-bot:
        failure-rate-threshold: ${INSTAGRAM_CB_FAILURE_RATE_THRESHOLD:50}
        slow-call-rate-threshold: ${INSTAGRAM_CB_SLOW_CALL_RATE_THRESHOLD:40}
        slow-call-duration-threshold: ${INSTAGRAM_CB_SLOW_CALL_DURATION:PT10S}
        wait-duration-in-open-state: ${INSTAGRAM_CB_WAIT_DURATION_OPEN:PT30S}
        minimum-number-of-calls: ${INSTAGRAM_CB_MIN_CALLS:5}
        sliding-window-size: ${INSTAGRAM_CB_SLIDING_WINDOW_SIZE:10}
        sliding-window-type: COUNT_BASED
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        record-exceptions:
          - java.net.ConnectException
          - java.net.SocketTimeoutException
          - org.springframework.web.client.ResourceAccessException
        ignore-exceptions:
          - java.lang.IllegalArgumentException
      # Cryptomus API Circuit Breaker
      cryptomus-api:
        failure-rate-threshold: ${CRYPTOMUS_CB_FAILURE_RATE_THRESHOLD:50}
        slow-call-rate-threshold: ${CRYPTOMUS_CB_SLOW_CALL_RATE_THRESHOLD:40}
        slow-call-duration-threshold: ${CRYPTOMUS_CB_SLOW_CALL_DURATION:PT5S}
        wait-duration-in-open-state: ${CRYPTOMUS_CB_WAIT_DURATION_OPEN:PT30S}
        minimum-number-of-calls: ${CRYPTOMUS_CB_MIN_CALLS:10}
        sliding-window-size: ${CRYPTOMUS_CB_SLIDING_WINDOW_SIZE:20}
        sliding-window-type: COUNT_BASED
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        record-exceptions:
          - java.net.ConnectException
          - java.net.SocketTimeoutException
          - org.springframework.web.client.ResourceAccessException
        ignore-exceptions:
          - java.lang.IllegalArgumentException
  retry:
    instances:
      payment-api:
        max-attempts: 2
        wait-duration: PT3S
      # Instagram Bot Retry
      instagram-bot:
        max-attempts: ${INSTAGRAM_RETRY_MAX_ATTEMPTS:3}
        wait-duration: ${INSTAGRAM_RETRY_WAIT_DURATION:PT2S}
        exponential-backoff-multiplier: 2.0
        retry-exceptions:
          - java.net.ConnectException
          - java.net.SocketTimeoutException
          - org.springframework.web.client.ResourceAccessException
        ignore-exceptions:
          - java.lang.IllegalArgumentException
      # Cryptomus API Retry
      cryptomus-api:
        max-attempts: ${CRYPTOMUS_RETRY_MAX_ATTEMPTS:3}
        wait-duration: ${CRYPTOMUS_RETRY_WAIT_DURATION:PT2S}
        exponential-backoff-multiplier: 2.0
        retry-exceptions:
          - java.net.ConnectException
          - java.net.SocketTimeoutException
        ignore-exceptions:
          - java.lang.IllegalArgumentException

# ===============================
# MONITORING & OBSERVABILITY
# ===============================
management:
  tracing:
    enabled: false  # Disable OpenTelemetry tracing
    sampling:
      probability: 0.0  # Disable all tracing
  otlp:
    metrics:
      export:
        enabled: false  # Disable OTLP metrics export
    tracing:
      endpoint: ""  # Disable OTLP exporter
      enabled: false  # Explicitly disable OTLP tracing
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,loggers,kafka,env,threaddump,heapdump
      base-path: /actuator
    jmx:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
      group:
        # Liveness = "is the JVM able to serve at all?" — should ONLY fail when the
        # process itself is wedged (deadlock, OOM, app context broken). A transient
        # Postgres/Redis blip must NOT make liveness fail, otherwise the orchestrator
        # restarts a healthy app and snowballs the outage.
        liveness:
          include: livenessState
        # Readiness = "is the app ready to take a new request?" — fail when the deps
        # we actually need to serve a request are unhealthy, so the LB stops sending
        # traffic until they recover.
        readiness:
          include: readinessState, db, redis
    metrics:
      enabled: true
    info:
      enabled: true
    kafka:
      enabled: true
  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    enable:
      jvm: true
      process: true
      system: true
      tomcat: true
      kafka: true
    distribution:
      percentiles-histogram:
        http.server.requests: true
        payment.processing.time: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
    redis:
      enabled: true
    db:
      enabled: true
    kafka:
      enabled: true

# ===============================
# APPLICATION INFO
# ===============================
info:
  app:
    name: SMM Panel
    version: "@project.version@"
    description: Social Media Marketing Panel
    encoding: "@project.build.sourceEncoding@"
    java:
      version: "@java.version@"

# ===============================
# LOGGING CONFIGURATION
# ===============================
logging:
  level:
    root: INFO
    com.smmpanel: INFO
    # Hibernate / Spring DEBUG/TRACE moved out of the safe defaults: BasicBinder
    # at TRACE leaks every JDBC bind value (BCrypt hashes, refresh tokens, OTP
    # codes) to logs — the kind of thing an audit dings as a P1. Keep them at
    # WARN here; flip them up only via application-dev.yml or LOGGING_LEVEL_*
    # env vars when actively debugging.
    org.springframework.security: INFO
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql.BasicBinder: WARN
    org.hibernate.type: WARN
    org.springframework.orm.jpa: INFO
    org.springframework.transaction: INFO
    # Spring Data Redis on DEBUG would self-feed the Logback Redis appender:
    # every appender write opens a Redis connection, the connection lifecycle
    # logs at DEBUG, those events go through the appender chain, the appender
    # writes again — a runaway loop that produced ~100k spam lines per minute
    # on prod and drowned every real event in the /admin/system Logs tab.
    org.springframework.data.redis: WARN
  pattern:
    console: >
      "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: >
      "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: ${LOG_FILE_PATH:/var/log/smm-panel/application.log}
  logback:
    rollingpolicy:
      max-file-size: 100MB
      total-size-cap: 1GB
      max-history: 30
