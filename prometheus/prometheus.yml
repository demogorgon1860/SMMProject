global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Spring Boot Application Metrics
  - job_name: 'spring-boot'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['spring-boot-app:8080']
        labels:
          application: 'smm-panel'
          environment: 'production'
    scrape_interval: 15s

  # Prometheus Self-Monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

# Alerting rules (enable when alert rules are defined)
# rule_files:
#   - '/etc/prometheus/alerts/*.yml'

# Alertmanager configuration (enable when alertmanager is deployed)
# alerting:
#   alertmanagers:
#     - static_configs:
